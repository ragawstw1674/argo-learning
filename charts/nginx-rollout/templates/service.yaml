apiVersion: v1
kind: Service
metadata:
  name: nginx-active-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nginx-rollout
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-preview-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nginx-rollout
